const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),
    'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b(SALT),iterations:ITER,hash:'SHA-256'},km,
    {name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(IV)},key,b(DATA));
  return new TextDecoder().decode(plain);
}
async function go(){
  const pw=document.getElementById('pw').value;
  try{
    const html=await unlock(pw);
    sessionStorage.setItem('radar_pw',pw);
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById('err').style.display='block';}
}
document.getElementById('go').addEventListener('click',go);
document.getElementById('pw').addEventListener('keydown',
  e=>{if(e.key==='Enter')go();});
const saved=sessionStorage.getItem('radar_pw');
if(saved){document.getElementById('pw').value=saved;go();}
</script></body></html>
